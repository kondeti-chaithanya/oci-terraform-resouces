name: Terraform OCI Dev

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:
      confirm:
        description: "Type APPLY to deploy"
        required: true
        default: "NO"

permissions:
  contents: read

env:
  TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
  TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
  TF_VAR_compartment_id: ${{ secrets.OCI_COMPARTMENT_OCID }}
  TF_VAR_region: ${{ secrets.OCI_REGION }}
  TF_VAR_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
  TF_VAR_private_key_path: /home/runner/.oci/oci_api_key.pem
  TF_VAR_admin_password: ${{ secrets.DB_ADMIN_PASSWORD }}

  AWS_ACCESS_KEY_ID: ${{ secrets.OCI_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.OCI_SECRET_KEY }}

jobs:

  terraform-plan:

    if: github.event_name != 'workflow_dispatch'

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: environments/dev

    steps:

      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Create OCI API Key
        run: |
          mkdir -p ~/.oci
          printf "%s" "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Verify Backend Credentials
        run: |
          test -n "$AWS_ACCESS_KEY_ID"
          test -n "$AWS_SECRET_ACCESS_KEY"
          echo "Backend credentials found."

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: environments/dev/tfplan

  terraform-apply:

    if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'APPLY'

    needs: []

    runs-on: ubuntu-latest

    environment: dev

    defaults:
      run:
        working-directory: environments/dev

    steps:

      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Create OCI API Key
        run: |
          mkdir -p ~/.oci
          printf "%s" "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Verify Backend Credentials
        run: |
          test -n "$AWS_ACCESS_KEY_ID"
          test -n "$AWS_SECRET_ACCESS_KEY"
          echo "Backend credentials found."

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan